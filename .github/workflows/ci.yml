name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: we_go_next

    env:
      MIX_ENV: test

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up BEAM
        uses: erlef/setup-beam@0f75c29430f34bb5af4cce5e3b7f6a8860fca236
        with:
          otp-version: "28"
          elixir-version: "1.19"

      - name: Set up Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29
        with:
          version: "0.15.2"

      - name: Configure Zigler
        run: |
          zig version
          echo "ZIG_EXECUTABLE_PATH=$(command -v zig)" >> "$GITHUB_ENV"

      - name: Cache dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/.cache/zigler
            we_go_next/_build
            we_go_next/deps
          key: ${{ runner.os }}-mix-${{ hashFiles('we_go_next/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Fetch dependencies
        run: mix deps.get

      - name: Run quality gate
        run: mix quality

  deploy:
    name: Deploy public mirror
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Deploy to Gigalixir
        uses: gigalixir/gigalixir-action@f9b91af95fb3cdb979b9a772f98c9be3935c6d6e
        with:
          gigalixir_email: ${{ secrets.GIGALIXIR_EMAIL }}
          gigalixir_api_key: ${{ secrets.GIGALIXIR_API_KEY }}
          app_name: we-go-next
          app_subfolder: we_go_next
          deploy_timeout: "300"
